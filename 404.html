<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Utkal Harvest - Premium Atta, Spices & Traditional Foods from Odisha</title>
    <script>
      // GitHub Pages SPA redirect
      var path = window.location.pathname;
      var pathArray = path.split('/');
      
      // Handle the /utkalharvest/ base path
      if (pathArray[1] === 'utkalharvest' && pathArray.length > 2) {
        // Get the rest of the path after utkalharvest
        var rest = '/' + pathArray.slice(2).join('/');
        window.location.replace('/utkalharvest/?' + encodeURIComponent(rest));
      } else if (path !== '/' && !path.includes('.')) {
        window.location.replace('/utkalharvest/?/' + encodeURIComponent(path));
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore the proper path from the search parameter
      var search = window.location.search;
      if (search.length > 1) {
        var originalPath = decodeURIComponent(search.substring(1));
        window.history.replaceState(null, null, '/utkalharvest' + originalPath);
      }
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
